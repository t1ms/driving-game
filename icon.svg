<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc" />
      <stop offset="50%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <!-- Car Body Gradient -->
    <linearGradient id="car-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff477e" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <!-- Car Window Gradient -->
    <linearGradient id="car-window" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <!-- Drop Shadow for Premium Feel -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0284c7" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- App Icon Background Rounded Rect -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Road Silhouette -->
  <path d="M 0 380 Q 256 360 512 380 L 512 512 L 0 512 Z" fill="#e2e8f0" opacity="0.9" />
  <path d="M 0 380 Q 256 360 512 380" stroke="#cbd5e1" stroke-width="8" stroke-dasharray="24 16" fill="none" />

  <!-- The Driving Game Mascot Car -->
  <g filter="url(#shadow)">
    <!-- Car Body Shape -->
    <path d="M 120 280 
             C 120 230, 160 220, 200 220 
             L 312 220 
             C 352 220, 392 230, 392 280 
             L 412 280 
             C 432 280, 442 295, 442 315 
             L 442 355 
             C 442 375, 422 375, 412 375 
             L 100 375 
             C 90 375, 70 375, 70 355 
             L 70 315 
             C 70 295, 80 280, 100 280 
             Z" fill="url(#car-body)" />

    <!-- Car Cabin / Windows -->
    <path d="M 170 220 
             L 200 150 
             C 210 135, 230 130, 256 130 
             C 282 130, 302 135, 312 150 
             L 342 220 
             Z" fill="url(#car-window)" stroke="#ffffff" stroke-width="8" stroke-linejoin="round" />

    <!-- Window Divider -->
    <line x1="256" y1="130" x2="256" y2="220" stroke="#ffffff" stroke-width="8" />

    <!-- Headlight (Left / Front) -->
    <circle cx="410" cy="315" r="16" fill="#facc15" stroke="#ffffff" stroke-width="4" />
    <!-- Tail Light (Right / Back) -->
    <rect x="80" y="300" width="16" height="30" rx="6" fill="#ef4444" stroke="#ffffff" stroke-width="4" />

    <!-- Wheels -->
    <circle cx="160" cy="375" r="45" fill="#1e293b" stroke="#ffffff" stroke-width="10" />
    <circle cx="160" cy="375" r="18" fill="#94a3b8" />

    <!-- Front Wheel -->
    <circle cx="352" cy="375" r="45" fill="#1e293b" stroke="#ffffff" stroke-width="10" />
    <circle cx="352" cy="375" r="18" fill="#94a3b8" />
  </g>

  <!-- Sparkles / Twinkle -->
  <path d="M 400 90 L 410 110 L 430 115 L 410 120 L 400 140 L 390 120 L 370 115 L 390 110 Z" fill="#facc15" />
  <path d="M 110 90 L 115 100 L 125 102 L 115 105 L 110 115 L 105 105 L 95 102 L 105 100 Z" fill="#ffffff" opacity="0.9" />
</svg>
